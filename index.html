<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier Studio</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .app-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .app-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 24px 0;
        }

        .btn-action {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-action:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-action:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #view-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 24px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--border);
            background-color: #0b0f19;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            transform: scaleX(-1); /* ส่องกระจกแบบธรรมชาติ */
        }

        .timer-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: #38bdf8;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #label-container {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .prediction-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 12px;
        }

        .prediction-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .progress-bar-bg {
            background-color: var(--border);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #4f46e5, #06b6d4);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="app-header">
        <h1>AI Image Classifier</h1>
        <p>ระบบแยกแยะวัตถุอัจฉริยะ ทำนายผลทุกๆ 3 วินาที</p>
    </div>

    <button type="button" id="control-btn" class="btn-action" onclick="initializeApp()">
        เปิดใช้งานระบบ
    </button>

    <div id="view-wrapper" style="display: none;">
        <div id="webcam-container"></div>
        <div class="timer-badge">AI Scan: Every 3s</div>
    </div>

    <div id="label-container"></div>
</div>

<!-- Core Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดล Teachable Machine ของคุณ[cite: 2]
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/8DwRUHUVf/";[cite: 2]

    let model, webcam, maxPredictions;
    let animationFrameId;
    let predictionIntervalId;

    async function initializeApp() {
        const btn = document.getElementById("control-btn");
        btn.disabled = true;
        btn.innerText = "กำลังโหลดโมเดล AI...";

        try {
            // 1. โหลดโมเดลและเมทาดาตา[cite: 2]
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");[cite: 2]
            maxPredictions = model.getTotalClasses();[cite: 2]

            // 2. ตั้งค่ากล้องเว็บแคม (280x280 เพื่อให้สมส่วนกับ UI)
            webcam = new tmImage.Webcam(280, 280, true);[cite: 2]
            await webcam.setup();[cite: 2]
            await webcam.play();[cite: 2]

            // 3. แสดงพื้นที่แสดงผลกล้องและสร้าง UI รายการผลลัพธ์
            document.getElementById("view-wrapper").style.display = "block";
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
            buildPredictionUI();

            // 4. สั่งให้กล้อง Render ภาพลื่นไหลตามปกติ (Real-time Video Feed)
            renderWebcamStream();

            // 5. สั่งให้ตัว AI ส่งภาพไปประมวลผลทุกๆ 3 วินาที (3000 ms)
            predictionIntervalId = setInterval(executePrediction, 3000);

            // ซ่อนปุ่มเปิดระบบเมื่อทำงานสำเร็จเรียบร้อย
            btn.style.display = "none";

            // รันทำนายผลครั้งแรกทันทีโดยไม่ต้องรอให้ครบ 3 วินาทีก่อน
            executePrediction();

        } catch (error) {
            console.error("Initialization Failed:", error);
            btn.disabled = false;
            btn.innerText = "เกิดข้อผิดพลาด ลองใหม่อีกครั้ง";
            alert("ไม่สามารถเข้าถึงกล้อง หรือโหลดโมเดลได้สำเร็จ กรุณาตรวจสอบสิทธิ์การเข้าถึงกล้องของคุณ");
        }
    }

    // ฟังก์ชันวาดเฟรมกล้องให้ลื่นไหลต่อเนื่อง
    function renderWebcamStream() {
        webcam.update();[cite: 2]
        animationFrameId = window.requestAnimationFrame(renderWebcamStream);
    }

    // ฟังก์ชันสร้างโครงสร้าง HTML สำหรับแถบสถานะการทำนายผล
    function buildPredictionUI() {
        const container = document.getElementById("label-container");
        container.innerHTML = ""; // ล้างค่าเก่าออกก่อน
        
        for (let i = 0; i < maxPredictions; i++) {
            const item = document.createElement("div");
            item.className = "prediction-item";
            item.innerHTML = `
                <div class="prediction-info">
                    <span class="class-name">Loading...</span>
                    <span class="class-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="bar-${i}"></div>
                </div>
            `;
            container.appendChild(item);
        }
    }

    // ฟังก์ชันดึงภาพปัจจุบันส่งให้ AI ทำนายผล (ทำงานทุกๆ 3 วินาที)
    async function executePrediction() {
        if (!model || !webcam) return;

        const predictions = await model.predict(webcam.canvas);[cite: 2]
        const items = document.getElementsByClassName("prediction-item");

        for (let i = 0; i < maxPredictions; i++) {
            const className = predictions[i].className;
            const probability = predictions[i].probability;
            const percentage = Math.round(probability * 100);

            // อัปเดตข้อความและเปอร์เซ็นต์
            items[i].querySelector(".class-name").innerText = className;
            items[i].querySelector(".class-percent").innerText = `${percentage}%`;

            // อัปเดตความยาวของโปรเกรสบาร์ให้วิ่งอย่างสวยงาม
            const bar = document.getElementById(`bar-${i}`);
            bar.style.width = `${percentage}%`;
            
            // เปลี่ยนสีตามระดับความมั่นใจ (มั่นใจมากสีฟ้า/มั่นใจน้อยสีซีดลง)
            bar.style.opacity = probability > 0.5 ? "1" : "0.5";
        }
    }
</script>

</body>
</html>
