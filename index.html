<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        /* ปรับแต่งสไตล์ให้สวยงามและโมเดิร์น */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            border: 4px solid #e2e8f0;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            padding: 10px 16px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            font-weight: 500;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" id="start-btn" onclick="init()">เปิดกล้องเริ่มต้นการทำงาน</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/8DwRUHUVf/";[cite: 2]

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval; // เพิ่มตัวแปรสำหรับเก็บค่า Interval

    // โหลดโมเดลและตั้งค่ากล้อง[cite: 2]
    async function init() {
        // ซ่อนปุ่มหลังจากกดเพื่อป้องกันการกดซ้ำ
        document.getElementById("start-btn").style.display = "none";
        
        const modelURL = URL + "model.json";[cite: 2]
        const metadataURL = URL + "metadata.json";[cite: 2]

        // โหลดโมเดล[cite: 2]
        model = await tmImage.load(modelURL, metadataURL);[cite: 2]
        maxPredictions = model.getTotalClasses();[cite: 2]

        // ตั้งค่ากล้อง (ปรับขนาดเป็น 250x250 ให้เข้ากับดีไซน์ใหม่)
        const flip = true;[cite: 2]
        webcam = new tmImage.Webcam(250, 250, flip);[cite: 2]
        await webcam.setup();[cite: 2]
        await webcam.play();[cite: 2]
        
        // แทนที่ loop เดิมด้วย setInterval เพื่อทำงานทุกๆ 3000 มิลลิวินาที (3 วินาที)
        predictInterval = setInterval(async () => {
            webcam.update(); // อัปเดตเฟรมภาพจากกล้อง[cite: 2]
            await predict(); // ประมวลผลทำนายผล[cite: 2]
        }, 3000);

        // แสดงผลกล้องบนหน้าเว็บ[cite: 2]
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
        labelContainer = document.getElementById("label-container");[cite: 2]
        
        // สร้างโครงสร้าง Div สำหรับแสดงผลแถบคะแนนให้สวยงาม[cite: 2]
        for (let i = 0; i < maxPredictions; i++) {[cite: 2]
            const row = document.createElement("div");
            row.className = "label-row";
            labelContainer.appendChild(row);[cite: 2]
        }
    }

    // ฟังก์ชันทำนายผลภาพ[cite: 2]
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 2]
        for (let i = 0; i < maxPredictions; i++) {[cite: 2]
            // แยกชื่อคลาสและเปอร์เซ็นต์ออกจากกันเพื่อให้จัดหน้าจอได้สวยงามขึ้น
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%"; 
            
            labelContainer.childNodes[i].innerHTML = `
                <span>${className}</span>
                <span style="color: #3498db; font-weight: bold;">${probability}</span>
            `;
        }
    }
</script>

</body>
</html>
