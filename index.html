<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <!-- นำเข้า Tailwind CSS สำหรับการตกแต่งที่สวยงาม -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* ตกแต่งเพิ่มเติมสำหรับ Canvas ของกล้องให้ดูโค้งมนและมีมิติ */
        #webcam-container canvas {
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 320px;
            height: auto;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center border border-slate-100">
        <!-- ส่วนหัวข้อ -->
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Teachable Machine</h1>
        <p class="text-sm text-slate-500 mb-6">ระบบวิเคราะห์รูปภาพผ่านกล้อง (อัปเดตทุก 3 วินาที)</p>
        
        <!-- ปุ่มกด Start -->
        <button type="button" onclick="init()" id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 cursor-pointer mb-6">
            เริ่มทำงาน (Start Camera)
        </button>

        <!-- ส่วนแสดงผลกล้อง WebCam -->
        <div id="webcam-container" class="flex justify-center mb-6 min-h-[240px] items-center bg-slate-100 rounded-2xl border-2 border-dashed border-slate-200 p-2">
            <span id="placeholder-text" class="text-sm text-slate-400">กดปุ่มด้านบนเพื่อเปิดกล้อง</span>
        </div>

        <!-- ส่วนแสดงผลการทำนาย (Labels) -->
        <div id="label-container" class="space-y-3 text-left"></div>
    </div>

    <!-- นำเข้า Scripts ของ TensorFlow และ Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดลของคุณจาก Teachable Machine
        const URL = "https://teachablemachine.withgoogle.com/models/8DwRUHUVf/";

        let model, webcam, labelContainer, maxPredictions;
        let lastPredictTime = 0; // ตัวแปรเก็บเวลาล่าสุดที่ทำการทำนาย

        // ฟังก์ชันเริ่มต้นระบบเมื่อกดปุ่ม
        async function init() {
            // ซ่อนข้อความ Placeholder และเปลี่ยนสถานะปุ่ม
            const startBtn = document.getElementById("start-btn");
            const placeholder = document.getElementById("placeholder-text");
            if (placeholder) placeholder.remove();
            
            startBtn.disabled = true;
            startBtn.innerText = "กำลังโหลดโมเดล...";
            startBtn.classList.脫add = "bg-slate-400";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลดโมเดล
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่ากล้อง WebCam (กว้าง 320, สูง 320 เพื่อให้เป็นจัตุรัสที่ชัดขึ้น)
            const flip = true; 
            webcam = new tmImage.Webcam(320, 320, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            // เริ่มลูปการทำงานของกล้อง
            window.requestAnimationFrame(loop);

            // แสดงผลกล้องบนหน้าเว็บ
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            // สร้างโครงสร้างแถบแสดงผลความน่าจะเป็นให้สวยงาม
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "bg-slate-50 p-3 rounded-lg border border-slate-100 flex flex-col gap-1.5";
                row.innerHTML = `
                    <div class="flex justify-between text-sm font-medium">
                        <span class="class-name text-slate-700">-</span>
                        <span class="class-prob text-indigo-600">0%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-2">
                        <div class="progress-bar bg-indigo-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                `;
                labelContainer.appendChild(row);
            }

            startBtn.innerText = "ระบบกำลังทำงาน...";
            startBtn.className = "w-full bg-emerald-500 text-white font-medium py-3 px-4 rounded-xl cursor-not-allowed mb-6 text-center";
        }

        // ลูปควบคุมหน้าจอและการทำงาน
        async function loop(timestamp) {
            webcam.update(); // อัปเดตเฟรมของกล้องเพื่อให้ภาพเคลื่อนไหวลื่นไหลตลอดเวลา
            
            // ตรวจสอบว่าเวลาผ่านไปครบ 3,000 มิลลิวินาที (3 วินาที) หรือยัง
            if (!lastPredictTime || timestamp - lastPredictTime >= 3000) {
                lastPredictTime = timestamp; // บันทึกเวลาปัจจุบันไว้
                await predict(); // เรียกฟังก์ชันทำนายผล
            }
            
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันทำนายผลภาพจากกล้อง
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0) + "%";
                
                // อัปเดตข้อความและแถบความคืบหน้า (Progress Bar)
                const rows = labelContainer.childNodes;
                rows[i].querySelector(".class-name").innerText = className;
                rows[i].querySelector(".class-prob").innerText = percentage;
                rows[i].querySelector(".progress-bar").style.width = percentage;
            }
        }
    </script>
</body>
</html>
